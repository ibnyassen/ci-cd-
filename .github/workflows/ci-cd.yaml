name: HTTP APP WORKFLOW

on:
  push:
    branches:
      - main

jobs:
  test_and_build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone code
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Node.js packages
        run: npm install

      # - name: Run tests
      #   run: npm test

      - name: Build app
        run: npm run build